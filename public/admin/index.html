<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>REC · Painel Admin</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    /* ── REC palette ─────────────────────────────────────── */
    :root {
      --rec-teal:      #00a198;
      --rec-teal-deep: #006d68;
      --rec-blue:      #012659;
      --rec-purple:    #6c5ab2;
      --rec-navy:      #253439;
      --rec-bg:        #f5f8f9;
      --rec-cream:     #faf9f6;
      --rec-grad:      linear-gradient(135deg, #006d68 0%, #00a198 55%, #6c5ab2 100%);
    }

    /* ── Splash screen ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--rec-bg); }

    #rec-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--rec-grad);
      transition: opacity 500ms ease;
    }
    #rec-splash.fade-out { opacity: 0; pointer-events: none; }

    .splash-logo {
      width: 140px; height: auto;
      filter: brightness(0) invert(1);
      margin-bottom: 28px;
      animation: splash-in 600ms cubic-bezier(0.22,1,0.36,1) both;
    }
    .splash-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      animation: splash-in 600ms 80ms cubic-bezier(0.22,1,0.36,1) both;
    }
    .splash-sub {
      color: rgba(255,255,255,0.75);
      font-size: 0.85rem;
      margin-bottom: 36px;
      animation: splash-in 600ms 140ms cubic-bezier(0.22,1,0.36,1) both;
    }
    .splash-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 750ms linear infinite;
    }
    @keyframes splash-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Decap CMS overrides ─────────────────────────────── */
    /* Header bar */
    [class*="AppHeader"], [class*="app-header"],
    [class*="Navbar"], [class*="nav-bar"],
    header[class] {
      background: var(--rec-grad) !important;
      border-bottom: none !important;
      box-shadow: 0 2px 16px rgba(0,109,104,0.18) !important;
    }

    /* Logo/brand area inside header */
    [class*="AppHeader"] [class*="logo"],
    [class*="AppHeader"] img {
      filter: brightness(0) invert(1) !important;
    }

    /* Primary action buttons (Salvar, Publicar) */
    button[class*="success"],
    button[class*="primary"],
    [class*="ToolbarButton"][class*="primary"],
    button[data-testid*="save"],
    button[data-testid*="publish"] {
      background: var(--rec-teal) !important;
      border-color: var(--rec-teal) !important;
      color: #fff !important;
    }
    button[class*="success"]:hover,
    button[class*="primary"]:hover {
      background: var(--rec-teal-deep) !important;
      border-color: var(--rec-teal-deep) !important;
    }

    /* Sidebar navigation */
    [class*="Sidebar"], [class*="sidebar"],
    nav[class*="Collection"] {
      background: var(--rec-blue) !important;
    }
    [class*="Sidebar"] [class*="active"],
    [class*="sidebar"] [class*="active"],
    [class*="NavLink"][class*="active"] {
      background: rgba(0,161,152,0.2) !important;
      border-left: 3px solid var(--rec-teal) !important;
      color: var(--rec-teal) !important;
    }
    [class*="Sidebar"] *, [class*="sidebar"] * {
      color: rgba(255,255,255,0.85) !important;
    }
    [class*="Sidebar"] [class*="active"] *,
    [class*="sidebar"] [class*="active"] * {
      color: var(--rec-teal) !important;
    }

    /* Main content area */
    [class*="MainView"], [class*="main-view"],
    [class*="EditorContainer"], [class*="Collection"] > div:not([class*="Sidebar"]) {
      background: var(--rec-cream) !important;
    }

    /* Form inputs focus */
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus,
    select:focus,
    [class*="TextInput"]:focus-within,
    [class*="input"]:focus-within {
      border-color: var(--rec-teal) !important;
      box-shadow: 0 0 0 2px rgba(0,161,152,0.18) !important;
    }

    /* Collection header / page titles */
    [class*="CollectionHeader"],
    [class*="collection-header"] {
      background: linear-gradient(135deg, var(--rec-teal-deep) 0%, var(--rec-blue) 100%) !important;
      color: #fff !important;
    }

    /* Entry cards hover */
    [class*="EntryCard"]:hover,
    [class*="entry-card"]:hover {
      border-color: var(--rec-teal) !important;
      box-shadow: 0 4px 20px rgba(0,161,152,0.15) !important;
    }

    /* Secondary / outline buttons */
    button[class*="secondary"],
    button[class*="outline"],
    [class*="ToolbarButton"]:not([class*="primary"]) {
      border-color: var(--rec-teal) !important;
      color: var(--rec-teal) !important;
    }

    /* Tags & badges */
    [class*="Tag"], [class*="Badge"],
    [class*="label"][class*="published"] {
      background: rgba(0,161,152,0.12) !important;
      color: var(--rec-teal-deep) !important;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.04); }
    ::-webkit-scrollbar-thumb { background: var(--rec-teal); border-radius: 99px; }

    /* ── Top bar strip logo (injected via JS) ────────────── */
    #rec-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 8000;
      height: 52px;
      background: var(--rec-grad);
      display: flex; align-items: center;
      padding: 0 24px;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0,109,104,0.22);
      pointer-events: none; /* deixa o CMS clicável por baixo */
    }
    #rec-topbar img { height: 28px; filter: brightness(0) invert(1); opacity: 0.95; }
    #rec-topbar span {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }
    /* Empurra o conteúdo do CMS para baixo da topbar quando ele carrega */
    body.cms-loaded > div:first-child { padding-top: 52px !important; }
  </style>
</head>
<body>

  <!-- ── Cache / SW cleanup — roda antes do Decap CMS para evitar 404 em cache ── -->
  <script>
    (function() {
      // 1) Desregistrar todos os Service Workers registrados nesta origem
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) { reg.unregister(); });
        });
      }
      // 2) Limpar todos os caches de API do browser
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) { caches.delete(key); });
        });
      }
    })();
  </script>

  <!-- ── Splash screen ──────────────────────────────────── -->
  <div id="rec-splash">
    <img class="splash-logo" src="/logo-text.png" alt="REC Colaborativo" />
    <p class="splash-title">Painel Admin</p>
    <p class="splash-sub">Só a fundadora entra aqui ✦</p>
    <div class="splash-spinner"></div>
  </div>

  <!-- ── Decap CMS ─────────────────────────────────────── -->
  <!-- Versão fixada 3.12.2 para evitar regressões de versão -->
  <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>

  <!-- ── Configuração inline — sem fetch de config.yml ──────────────────
       Embeds the full CMS config in JS so the browser never needs to
       fetch /admin/config.yml separately (eliminates the 404-cache bug).
  ─────────────────────────────────────────────────────────────────────── -->
  <script>
    if (window.CMS) {
      window.CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'recolaborativo-create/site-rec',
            branch: 'main',
            base_url: 'https://somosrecoficial.com.br',
            auth_endpoint: '/api/auth',
          },
          publish_mode: 'simple',
          media_folder: 'site/public/partners',
          public_folder: '/partners',
          site_url: 'https://somosrecoficial.com.br',
          display_url: 'https://somosrecoficial.com.br',
          logo_url: 'https://somosrecoficial.com.br/logo-text.png',
          locale: 'pt',
          collections: [
            {
              name: 'empresas',
              label: 'Empresas (novas)',
              label_singular: 'Empresa',
              description: 'Adicionar uma nova empresa parceira que aparece na constelação automaticamente.',
              folder: 'site/src/content/partners',
              create: true,
              delete: true,
              extension: 'json',
              format: 'json',
              identifier_field: 'id',
              slug: '{{id}}',
              summary: '{{name}} ({{sector}})',
              fields: [
                {
                  label: 'Identificador', name: 'id', widget: 'string',
                  hint: 'Slug curto e único — letras minúsculas e hífens. Exemplo: "boutique-flora"',
                  pattern: ['^[a-z0-9-]+$', 'Use só letras minúsculas, números e hífens'],
                },
                {
                  label: 'Nome de exibição', name: 'name', widget: 'string',
                  hint: 'Como aparece no site. Ex: "Boutique Flora"',
                },
                {
                  label: 'Instagram (opcional)', name: 'instagram', widget: 'string',
                  required: false, hint: 'Com @ na frente. Ex: "@boutiqueflora"',
                },
                {
                  label: 'Segmento', name: 'sector', widget: 'select',
                  options: [
                    { label: 'Advocacia',     value: 'advocacia'    },
                    { label: 'Arquitetura',   value: 'arquitetura'  },
                    { label: 'Assessoria',    value: 'assessoria'   },
                    { label: 'Beleza',        value: 'beleza'       },
                    { label: 'Consultoria',   value: 'consultoria'  },
                    { label: 'Contabilidade', value: 'contabilidade'},
                    { label: 'Educação',      value: 'educacao'     },
                    { label: 'Eventos',       value: 'eventos'      },
                    { label: 'Gastronomia',   value: 'gastronomia'  },
                    { label: 'Imóveis',       value: 'imoveis'      },
                    { label: 'Marketing',     value: 'marketing'    },
                    { label: 'Moda',          value: 'moda'         },
                    { label: 'Saúde',         value: 'saude'        },
                    { label: 'Serviços',      value: 'servicos'     },
                    { label: 'Tech',          value: 'tech'         },
                    { label: 'Turismo',       value: 'turismo'      },
                    { label: 'Outro',         value: 'outro'        },
                  ],
                  default: 'servicos',
                },
                {
                  label: 'Logo', name: 'logo', widget: 'image',
                  choose_url: false,
                  media_library: { config: { max_file_size: 524288 } },
                  hint: 'PNG/JPEG com fundo transparente ou branco. Recomendado 400x240px. Máximo 500KB.',
                },
                {
                  label: 'Descrição', name: 'description', widget: 'text',
                  required: false,
                  pattern: ['^.{0,280}$', 'Máximo 280 caracteres (~5 linhas)'],
                  hint: 'Até 5 linhas curtas (~280 caracteres) sobre o que a empresa faz.',
                },
                {
                  label: 'Alcance (visual)', name: 'reach', widget: 'select',
                  options: ['1', '2', '3', '4', '5'], default: '3',
                  hint: 'Tamanho relativo na constelação. 3 é o padrão; 4-5 destaca empresas com mais visibilidade.',
                },
              ],
            },
          ],
        },
      });
    }
  </script>

  <script>
    // ── Splash fade + topbar injection ───────────────────
    const splash = document.getElementById('rec-splash')

    function hideSplash() {
      if (!splash) return
      splash.classList.add('fade-out')
      setTimeout(() => splash.remove(), 600)
    }

    // Injeta a topbar assim que o CMS começar a montar
    function injectTopbar() {
      if (document.getElementById('rec-topbar')) return
      const bar = document.createElement('div')
      bar.id = 'rec-topbar'
      bar.innerHTML = `
        <img src="/logo-white.png" alt="REC" />
        <span>· Painel Admin</span>
      `
      document.body.appendChild(bar)
      document.body.classList.add('cms-loaded')
    }

    // Decap CMS expõe window.CMS — hookamos o preSave só pra detectar mount
    if (window.CMS) {
      window.CMS.registerEventListener({
        name: 'preSave',
        handler: ({ entry }) => entry.get('data'),
      })
    }

    // Observer: quando o CMS montar no DOM, escondemos o splash
    const observer = new MutationObserver(() => {
      const cms = document.querySelector('[class*="AppHeader"], [class*="Navbar"], [class*="app-header"]')
      if (cms) {
        hideSplash()
        injectTopbar()
        observer.disconnect()
      }
    })
    observer.observe(document.body, { childList: true, subtree: true })

    // Fallback: depois de 2.5s some o splash independente do CMS
    setTimeout(() => {
      hideSplash()
      injectTopbar()
    }, 2500)
  </script>
</body>
</html>
